trigger:
- main

pool:
  name: 'bala-poc'

variables:
  # TRY THIS: Remove the leading slash and verify case sensitivity
  # If your folder is "Infra-Live", this MUST be capital 'I'
  workingDirectory: '$(System.DefaultWorkingDirectory)/infra-live/dev'
  serviceConnection: 'bala'

stages:
- stage: Terraform_Plan
  jobs:
  - job: Plan
    steps:
    - checkout: self
      clean: true

    # 1. DEBUG STEP: Run this to see the real folder structure
    - bash: |
        echo "Current Directory: $(pwd)"
        echo "Root Contents:"
        ls -R $(System.DefaultWorkingDirectory)
      displayName: 'Check Folder Structure'

    # 2. TERRAFORM INIT
    - bash: |
        # Check if directory exists before running
        if [ -d "$(workingDirectory)" ]; then
          cd $(workingDirectory)
          terraform init \
            -backend-config="resource_group_name=terraform-mgmt-rg" \
            -backend-config="storage_account_name=productionstorage2026" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=dev.terraform.tfstate"
        else
          echo "ERROR: Directory $(workingDirectory) not found!"
          exit 1
        fi
      displayName: 'Terraform Init'
      env:
        ARM_CLIENT_ID: $(ARM_CLIENT_ID)
        ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
        ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
        ARM_TENANT_ID: $(ARM_TENANT_ID)
