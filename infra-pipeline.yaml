trigger:
- main

pool:
  name: 'bala-poc' # Your self-hosted agent

variables:
# 1. Link your Library secrets
- group: bala-secrets  
# 2. Set the folder path we found via 'pwd'
- name: workingDirectory
  value: '$(System.DefaultWorkingDirectory)/dev'

stages:
- stage: Terraform_Plan
  displayName: '1. Terraform Plan'
  jobs:
  - job: Plan
    steps:
    - checkout: self
      clean: true

    # Initialize Terraform (Downloads providers and modules from GitHub)
    - bash: |
        terraform init \
          -backend-config="resource_group_name=terraform-mgmt-rg" \
          -backend-config="storage_account_name=productionstorage2026" \
          -backend-config="container_name=tfstate" \
          -backend-config="key=dev.terraform.tfstate"
      displayName: 'Terraform Init'
      workingDirectory: $(workingDirectory)
      env:
        ARM_CLIENT_ID: $(ARM_CLIENT_ID)
        ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
        ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
        ARM_TENANT_ID: $(ARM_TENANT_ID)

    # Generate the execution plan
    - bash: terraform plan -out=tfplan
      displayName: 'Terraform Plan'
      workingDirectory: $(workingDirectory)
      env:
        ARM_CLIENT_ID: $(ARM_CLIENT_ID)
        ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
        ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
        ARM_TENANT_ID: $(ARM_TENANT_ID)

    # Save the plan so the Apply stage can download it
    - task: PublishPipelineArtifact@1
      inputs:
        targetPath: '$(workingDirectory)/tfplan'
        artifact: 'tfplan-file'

- stage: Terraform_Apply
  displayName: '2. Terraform Apply'
  dependsOn: Terraform_Plan
  condition: succeeded()
  jobs:
  - job: Apply
    steps:
    - checkout: self

    # Download the plan generated in the previous stage
    - task: DownloadPipelineArtifact@2
      inputs:
        artifact: 'tfplan-file'
        path: $(workingDirectory)

    # Re-initialize (Required for the Apply job to know about providers)
    - bash: |
        terraform init \
          -backend-config="resource_group_name=terraform-mgmt-rg" \
          -backend-config="storage_account_name=productionstorage2026" \
          -backend-config="container_name=tfstate" \
          -backend-config="key=dev.terraform.tfstate"
      displayName: 'Terraform Init'
      workingDirectory: $(workingDirectory)
      env:
        ARM_CLIENT_ID: $(ARM_CLIENT_ID)
        ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
        ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
        ARM_TENANT_ID: $(ARM_TENANT_ID)

    # Execute the plan
    - bash: terraform apply -auto-approve tfplan
      displayName: 'Terraform Apply'
      workingDirectory: $(workingDirectory)
      env:
        ARM_CLIENT_ID: $(ARM_CLIENT_ID)
        ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
        ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
        ARM_TENANT_ID: $(ARM_TENANT_ID)
