trigger:
- main

pool:
  name: 'bala-poc'

variables:
  workingDirectory: '$(System.DefaultWorkingDirectory)/infra-live/dev'
  # Use your Service Connection for the environment variables below
  serviceConnection: 'bala' 

stages:
- stage: Terraform_Plan
  jobs:
  - job: Plan
    steps:
    # Use a Bash script instead of the missing TerraformTask
    - bash: |
        terraform init \
          -backend-config="resource_group_name=terraform-mgmt-rg" \
          -backend-config="storage_account_name=productionstorage2026" \
          -backend-config="container_name=tfstate" \
          -backend-config="key=dev.terraform.tfstate"
      displayName: 'Terraform Init via Bash'
      workingDirectory: $(workingDirectory)
      env:
        # Note: You'll need to map your Service Connection secrets 
        # to these environment variables for the provider to work.
        ARM_CLIENT_ID: $(ARM_CLIENT_ID)
        ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
        ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
        ARM_TENANT_ID: $(ARM_TENANT_ID)
