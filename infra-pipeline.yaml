trigger:
- main

pool:
  name: 'bala-poc' # Your self-hosted agent

variables:
# 1. Link your Library secrets
- group: bala-secrets  
# 2. Set the folder path found via 'pwd'
- name: workingDirectory
  value: '$(System.DefaultWorkingDirectory)/dev'

stages:
# STAGE 1: PLAN
- stage: Terraform_Plan
  displayName: '1. Terraform Plan'
  jobs:
  - job: Plan
    steps:
    - checkout: self
      clean: true

    - bash: |
        terraform init \
          -backend-config="resource_group_name=terraform-mgmt-rg" \
          -backend-config="storage_account_name=productionstorage2026" \
          -backend-config="container_name=tfstate" \
          -backend-config="key=dev.terraform.tfstate"
      displayName: 'Terraform Init'
      workingDirectory: $(workingDirectory)
      env:
        ARM_CLIENT_ID: $(ARM_CLIENT_ID)
        ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
        ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
        ARM_TENANT_ID: $(ARM_TENANT_ID)

    - bash: terraform plan -out=tfplan
      displayName: 'Terraform Plan'
      workingDirectory: $(workingDirectory)
      env:
        ARM_CLIENT_ID: $(ARM_CLIENT_ID)
        ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
        ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
        ARM_TENANT_ID: $(ARM_TENANT_ID)

    - task: PublishPipelineArtifact@1
      inputs:
        targetPath: '$(workingDirectory)/tfplan'
        artifact: 'tfplan-file'

# STAGE 2: APPLY
- stage: Terraform_Apply
  displayName: '2. Terraform Apply'
  dependsOn: Terraform_Plan
  condition: succeeded()
  jobs:
  - job: Apply
    steps:
    - checkout: self

    - task: DownloadPipelineArtifact@2
      inputs:
        artifact: 'tfplan-file'
        path: $(workingDirectory)

    - bash: |
        terraform init \
          -backend-config="resource_group_name=terraform-mgmt-rg" \
          -backend-config="storage_account_name=productionstorage2026" \
          -backend-config="container_name=tfstate" \
          -backend-config="key=dev.terraform.tfstate"
      displayName: 'Terraform Init'
      workingDirectory: $(workingDirectory)
      env:
        ARM_CLIENT_ID: $(ARM_CLIENT_ID)
        ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
        ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
        ARM_TENANT_ID: $(ARM_TENANT_ID)

    - bash: terraform apply -auto-approve tfplan
      displayName: 'Terraform Apply'
      workingDirectory: $(workingDirectory)
      env:
        ARM_CLIENT_ID: $(ARM_CLIENT_ID)
        ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
        ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
        ARM_TENANT_ID: $(ARM_TENANT_ID)

# STAGE 3: DESTROY (Manual Approval Recommended)
- stage: Terraform_Destroy
  displayName: '3. Terraform Destroy'
  dependsOn: Terraform_Apply
  # condition: succeeded() # Remove this if you want to be able to destroy even if Apply fails
  jobs:
  - deployment: Destroy
    displayName: 'Destroy Infrastructure'
    environment: 'production' # Use an Azure DevOps Environment to add an Approval Check here
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
          
          - bash: |
              terraform init \
                -backend-config="resource_group_name=terraform-mgmt-rg" \
                -backend-config="storage_account_name=productionstorage2026" \
                -backend-config="container_name=tfstate" \
                -backend-config="key=dev.terraform.tfstate"
            displayName: 'Terraform Init'
            workingDirectory: $(workingDirectory)
            env:
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
              ARM_TENANT_ID: $(ARM_TENANT_ID)

          - bash: terraform destroy -auto-approve
            displayName: 'Terraform Destroy'
            workingDirectory: $(workingDirectory)
            env:
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
              ARM_TENANT_ID: $(ARM_TENANT_ID)
